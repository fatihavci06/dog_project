[global]
daemonize = no

[www]
listen = 9000

; =====================================================================
; PHP-FPM Worker Optimizasyonu
; Sunucu: 6 Çekirdek CPU, 15 GB RAM
; Her worker ~50MB RAM kullanır.
; 50 worker × 50MB = ~2.5 GB (15 GB'ın sadece %17'si)
; Bu ayarla ~5.000-7.500 anlık kullanıcıyı karşılayabilir.
; =====================================================================

; static: Her zaman sabit sayıda worker açık olur. Yeni istek geldiğinde
; worker açma/kapama gecikmesi olmaz. Yüksek trafik için idealdir.
pm = static
pm.max_children = 50

; Her worker 1000 istek sonrası kendini yeniler (bellek sızıntısını önler)
pm.max_requests = 500
